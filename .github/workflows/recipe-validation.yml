name: Recipe validation

on:
  pull_request:
    paths:
      - '_recipes/**/*.md'
      - 'scripts/validate-recipes.rb'
      - '.github/workflows/recipe-validation.yml'
  workflow_dispatch:

jobs:
  validate-recipes:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: '3.2'

      - name: Find changed recipe files
        id: changed-recipes
        shell: bash
        run: |
          if [[ "${{ github.event_name }}" == "pull_request" ]]; then
            git diff --name-only --diff-filter=ACMR "origin/${{ github.base_ref }}...HEAD" -- '_recipes/*.md' > changed-recipes.txt
          else
            find _recipes -type f -name '*.md' | sort > changed-recipes.txt
          fi

          if [[ -s changed-recipes.txt ]]; then
            echo "has_changes=true" >> "$GITHUB_OUTPUT"
            echo "Recipe files to validate:"
            cat changed-recipes.txt
          else
            echo "has_changes=false" >> "$GITHUB_OUTPUT"
            echo "No changed recipe files to validate."
          fi

      - name: Validate recipe format
        if: steps.changed-recipes.outputs.has_changes == 'true'
        run: xargs ruby scripts/validate-recipes.rb < changed-recipes.txt
